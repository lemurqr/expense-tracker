{% extends 'base.html' %}
{% block content %}
<section class="card">
  <h2>{{ 'Edit Expense' if expense else 'Add Expense' }}</h2>
  <form method="post" class="form-grid">
    <input type="hidden" name="month" value="{{ filter_params.month if filter_params else "" }}">
    <input type="hidden" name="start" value="{{ filter_params.start if filter_params else "" }}">
    <input type="hidden" name="end" value="{{ filter_params.end if filter_params else "" }}">
    {% if expense and expense.updated_at %}<input type="hidden" name="updated_at" value="{{ expense.updated_at }}">{% endif %}
    <label>Date
      <input type="date" name="date" value="{{ expense.date if expense else '' }}" required>
    </label>
    <label>Amount
      <input type="number" step="0.01" name="amount" value="{{ expense.amount if expense else '' }}" required>
      <small>Use negative for expenses, positive for refunds/credits.</small>
    </label>
    <label>Category
      <select name="category_id" id="category-id-select">
        <option value="">Uncategorized</option>
        {% for category in categories %}
          <option value="{{ category.id }}" {% if expense and expense.category_id == category.id %}selected{% endif %}>{{ category.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Subcategory
      <select name="subcategory_id" id="subcategory-id-select">
        <option value="">No subcategory</option>
      </select>
    </label>
    <label>Description
      <input name="description" value="{{ expense.description if expense else '' }}">
    </label>
    <label>Paid by
      <select name="paid_by">
        <option value="" {% if not expense or not expense.paid_by %}selected{% endif %}>-- Select --</option>
        <option value="DK" {% if expense and expense.paid_by == 'DK' %}selected{% endif %}>DK</option>
        <option value="YZ" {% if expense and expense.paid_by == 'YZ' %}selected{% endif %}>YZ</option>
      </select>
    </label>
    <button type="submit">Save</button>
  </form>
</section>

<script>
  (function () {
    var categorySelect = document.getElementById('category-id-select');
    var subcategorySelect = document.getElementById('subcategory-id-select');
    if (!categorySelect || !subcategorySelect) {
      return;
    }

    var subcategoriesByCategory = {{ subcategories_by_category|default({}, true)|tojson }};
    var selectedSubcategoryId = '{{ expense.subcategory_id if expense and expense.subcategory_id else "" }}';

    function renderSubcategories() {
      var categoryId = categorySelect.value;
      var options = subcategoriesByCategory[categoryId] || [];
      var previous = subcategorySelect.value || selectedSubcategoryId;
      subcategorySelect.innerHTML = '';

      var blankOption = document.createElement('option');
      blankOption.value = '';
      blankOption.textContent = 'No subcategory';
      subcategorySelect.appendChild(blankOption);

      options.forEach(function (subcategory) {
        var option = document.createElement('option');
        option.value = String(subcategory.id);
        option.textContent = subcategory.name;
        if (String(previous) === String(subcategory.id)) {
          option.selected = true;
        }
        subcategorySelect.appendChild(option);
      });

      if (!options.some(function (subcategory) { return String(subcategory.id) === String(previous); })) {
        subcategorySelect.value = '';
      }

      selectedSubcategoryId = '';
    }

    categorySelect.addEventListener('change', function () {
      selectedSubcategoryId = '';
      renderSubcategories();
    });

    renderSubcategories();
  })();
</script>
{% endblock %}
